services:
  # ── Backend (FastAPI) ────────────────────────────────────────
  - type: web
    name: socialdl-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://socialdl-frontend.onrender.com
      - key: ALLOWED_ORIGIN_REGEX
        value: "https://.*\\.onrender\\.com"
      - key: FILE_TTL_SECONDS
        value: "300"
      - key: MAX_FILE_SIZE_MB
        value: "500"
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend (Next.js) ───────────────────────────────────────
  - type: web
    name: socialdl-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://socialdl-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"
      - key: PORT
        value: "3000"
